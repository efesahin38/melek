name: melek_app
description: MELEK - Mitarbeiter Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP
  http: ^1.2.0

  # State management
  provider: ^6.1.2

  # Secure storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # Signature
  signature: ^5.4.0

  # File handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3
  open_file: ^3.3.2
  share_plus: ^9.0.0

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1
  crypto: ^3.0.3
  uuid: ^4.4.0
  shimmer: ^3.0.0
  supabase_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0A0A1A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
